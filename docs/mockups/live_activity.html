<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: #000000;
  color: #FFFFFF;
  width: 390px;
  height: 844px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.lock-screen {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #1a1a2e 0%, #000000 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 120px;
}
.lock-time {
  font-size: 78px;
  font-weight: 200;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}
.lock-date {
  font-size: 20px;
  font-weight: 400;
  color: #8E8E93;
  margin-top: 8px;
}
.dynamic-island {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 37px;
  background: #000000;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.island-icon {
  width: 24px;
  height: 24px;
  background: #007AFF;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.island-text {
  font-size: 12px;
  font-weight: 600;
}
.live-activity {
  background: rgba(28,28,30,0.85);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  margin: 40px 20px 0;
  padding: 16px 20px;
  width: calc(100% - 40px);
}
.activity-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.activity-train {
  display: flex;
  align-items: center;
  gap: 10px;
}
.activity-icon {
  width: 28px;
  height: 28px;
  background: rgba(0,122,255,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.activity-train-name {
  font-size: 15px;
  font-weight: 700;
  color: #007AFF;
}
.activity-live {
  font-size: 11px;
  font-weight: 700;
  color: #34C759;
  display: flex;
  align-items: center;
  gap: 4px;
}
.live-dot {
  width: 6px;
  height: 6px;
  background: #34C759;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.activity-route {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}
.activity-progress {
  margin-bottom: 12px;
}
.progress-track {
  height: 8px;
  background: #3A3A3C;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 65%;
  background: linear-gradient(90deg, #007AFF, #5AC8FA);
  border-radius: 4px;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
}
.activity-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.time-remaining {
  font-size: 15px;
  font-weight: 600;
}
.platform-info {
  font-size: 13px;
  color: #8E8E93;
}
.platform-info span {
  color: #007AFF;
  font-weight: 600;
}
.status-badge {
  background: rgba(52,199,89,0.15);
  color: #34C759;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}
.notification {
  background: rgba(28,28,30,0.85);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  margin: 12px 20px 0;
  padding: 12px 16px;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  gap: 12px;
}
.notif-icon {
  width: 36px;
  height: 36px;
  background: rgba(255,149,0,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.notif-content {
  flex: 1;
}
.notif-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.notif-body {
  font-size: 13px;
  color: #8E8E93;
}
.notif-time {
  font-size: 12px;
  color: #8E8E93;
}
.flashlight-camera {
  position: absolute;
  bottom: 60px;
  display: flex;
  gap: 120px;
}
.circle-btn {
  width: 50px;
  height: 50px;
  background: rgba(60,60,60,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.home-bar {
  position: absolute;
  bottom: 8px;
  width: 134px;
  height: 5px;
  background: #FFFFFF;
  border-radius: 3px;
}
</style>
</head>
<body>
<div class="lock-screen">
  <div class="dynamic-island">
    <div class="island-icon">🚄</div>
    <span class="island-text">Railmate</span>
  </div>
  <div class="lock-time">14:23</div>
  <div class="lock-date">Thursday, March 26</div>
  
  <div class="live-activity">
    <div class="activity-header">
      <div class="activity-train">
        <div class="activity-icon">🚄</div>
        <span class="activity-train-name">ICE 123</span>
      </div>
      <div class="activity-live">
        <span class="live-dot"></span>
        LIVE
      </div>
    </div>
    <div class="activity-route">Berlin → Munich</div>
    <div class="activity-progress">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
    <div class="activity-status">
      <span class="time-remaining">28 min remaining</span>
      <span class="platform-info">Platform <span>5</span></span>
      <span class="status-badge">On time</span>
    </div>
  </div>
  
  <div class="notification">
    <div class="notif-icon">⚠</div>
    <div class="notif-content">
      <div class="notif-title">Approaching Nuremberg</div>
      <div class="notif-body">Next stop in 12 minutes</div>
    </div>
    <span class="notif-time">2m ago</span>
  </div>
  
  <div class="flashlight-camera">
    <div class="circle-btn">🔦</div>
    <div class="circle-btn">📷</div>
  </div>
  <div class="home-bar"></div>
</div>
</body>
</html>
