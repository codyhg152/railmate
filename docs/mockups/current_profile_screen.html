<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: #000000;
  color: #FFFFFF;
  width: 390px;
  height: 844px;
  overflow: hidden;
}
.status-bar {
  height: 47px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 29px 12px;
  font-size: 14px;
  font-weight: 600;
}
.header {
  padding: 8px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.settings-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #1C1C1E;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #007AFF;
}
.profile-card {
  background: #1C1C1E;
  border-radius: 20px;
  margin: 0 16px 20px;
  padding: 24px;
  text-align: center;
}
.avatar {
  width: 80px;
  height: 80px;
  background: #007AFF;
  border-radius: 40px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.username {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}
.member-since {
  font-size: 15px;
  color: #8E8E93;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 0 16px 20px;
}
.stat-card {
  background: #1C1C1E;
  border-radius: 16px;
  padding: 16px 8px;
  text-align: center;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: #007AFF;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  color: #8E8E93;
  font-weight: 500;
}
.section-title {
  padding: 20px 20px 12px;
  font-size: 20px;
  font-weight: 700;
}
.achievement-list {
  padding: 0 16px;
}
.achievement-card {
  background: #1C1C1E;
  border-radius: 16px;
  margin-bottom: 12px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.achievement-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.achievement-icon.gold {
  background: #FFD700;
}
.achievement-icon.silver {
  background: #C0C0C0;
}
.achievement-icon.blue {
  background: #007AFF;
}
.achievement-info {
  flex: 1;
}
.achievement-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.achievement-desc {
  font-size: 13px;
  color: #8E8E93;
}
.achievement-progress {
  text-align: right;
}
.achievement-count {
  font-size: 20px;
  font-weight: 700;
  color: #34C759;
}
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 83px;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid #1C1C1E;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 8px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
}
.nav-item.active .nav-icon {
  color: #007AFF;
}
.nav-item.active .nav-label {
  color: #007AFF;
}
.nav-icon {
  font-size: 22px;
  color: #8E8E93;
}
.nav-label {
  font-size: 10px;
  color: #8E8E93;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="status-bar">
  <span>9:41</span>
  <span>●●●●●</span>
</div>
<div class="header">
  <h1>Profile</h1>
  <div class="settings-btn">⚙</div>
</div>
<div class="profile-card">
  <div class="avatar">🚄</div>
  <div class="username">Rail Traveler</div>
  <div class="member-since">Member since 2024</div>
</div>
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value">47</div>
    <div class="stat-label">Journeys</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">12.4k</div>
    <div class="stat-label">km</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">89%</div>
    <div class="stat-label">On Time</div>
  </div>
</div>
<div class="section-title">Achievements</div>
<div class="achievement-list">
  <div class="achievement-card">
    <div class="achievement-icon gold">🏆</div>
    <div class="achievement-info">
      <div class="achievement-name">Frequent Flyer</div>
      <div class="achievement-desc">Completed 25+ journeys</div>
    </div>
    <div class="achievement-progress">
      <div class="achievement-count">✓</div>
    </div>
  </div>
  <div class="achievement-card">
    <div class="achievement-icon blue">🎯</div>
    <div class="achievement-info">
      <div class="achievement-name">Punctual Passenger</div>
      <div class="achievement-desc">95% on-time arrival rate</div>
    </div>
    <div class="achievement-progress">
      <div class="achievement-count">89%</div>
    </div>
  </div>
  <div class="achievement-card">
    <div class="achievement-icon silver">🌍</div>
    <div class="achievement-info">
      <div class="achievement-name">Euro Explorer</div>
      <div class="achievement-desc">Visited 5+ countries</div>
    </div>
    <div class="achievement-progress">
      <div class="achievement-count">3/5</div>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <div class="nav-item">
    <span class="nav-icon">◐</span>
    <span class="nav-label">Journeys</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">▤</span>
    <span class="nav-label">Airports</span>
  </div>
  <div class="nav-item active">
    <span class="nav-icon">✈</span>
    <span class="nav-label">Profile</span>
  </div>
</div>
</body>
</html>
