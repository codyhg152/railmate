<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: #000000;
  color: #FFFFFF;
  width: 390px;
  height: 844px;
  overflow: hidden;
}
.status-bar {
  height: 47px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 29px 12px;
  font-size: 14px;
  font-weight: 600;
}
.header {
  padding: 8px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.add-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #1C1C1E;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #007AFF;
}
.section-title {
  padding: 20px 20px 12px;
  font-size: 13px;
  font-weight: 600;
  color: #8E8E93;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card {
  background: #1C1C1E;
  border-radius: 16px;
  margin: 0 16px 12px;
  padding: 16px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.train-number {
  font-size: 15px;
  font-weight: 600;
  color: #007AFF;
  background: rgba(0,122,255,0.15);
  padding: 4px 10px;
  border-radius: 6px;
}
.status {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
}
.status.on-time {
  background: rgba(52,199,89,0.15);
  color: #34C759;
}
.status.delayed {
  background: rgba(255,149,0,0.15);
  color: #FF9500;
}
.route {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.route-city {
  font-size: 20px;
  font-weight: 600;
}
.route-arrow {
  color: #8E8E93;
  font-size: 16px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
}
.info-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.info-label {
  font-size: 11px;
  color: #8E8E93;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.info-value {
  font-size: 17px;
  font-weight: 600;
}
.info-value.platform {
  color: #007AFF;
}
.warning {
  background: rgba(255,149,0,0.1);
  border-left: 3px solid #FF9500;
  padding: 10px 12px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 12px;
}
.warning-text {
  font-size: 13px;
  color: #FF9500;
}
.progress-container {
  margin-top: 12px;
}
.progress-bar-bg {
  height: 6px;
  background: #2C2C2E;
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #34C759 0%, #30D158 100%);
  border-radius: 3px;
}
.progress-bar-fill.delayed {
  background: linear-gradient(90deg, #FF9500 0%, #FF9F0A 100%);
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: #8E8E93;
}
.bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 83px;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px);
  border-top: 1px solid #1C1C1E;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 8px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
}
.nav-item.active .nav-icon {
  color: #007AFF;
}
.nav-item.active .nav-label {
  color: #007AFF;
}
.nav-icon {
  font-size: 22px;
  color: #8E8E93;
}
.nav-label {
  font-size: 10px;
  color: #8E8E93;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="status-bar">
  <span>9:41</span>
  <span>●●●●●</span>
</div>
<div class="header">
  <h1>Railmate</h1>
  <div class="add-btn">+</div>
</div>
<div class="section-title">TODAY</div>
<div class="card">
  <div class="card-header">
    <span class="train-number">ICE 123</span>
    <span class="status on-time">On Time</span>
  </div>
  <div class="route">
    <span class="route-city">Berlin</span>
    <span class="route-arrow">→</span>
    <span class="route-city">Munich</span>
  </div>
  <div class="info-row">
    <div class="info-item">
      <span class="info-label">Departure</span>
      <span class="info-value">14:35</span>
    </div>
    <div class="info-item">
      <span class="info-label">Platform</span>
      <span class="info-value platform">5</span>
    </div>
    <div class="info-item">
      <span class="info-label">Duration</span>
      <span class="info-value">4h 40m</span>
    </div>
  </div>
  <div class="progress-container">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width: 0%;"></div>
    </div>
    <div class="progress-labels">
      <span>Berlin Hbf</span>
      <span>Departing soon</span>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-header">
    <span class="train-number">TGV 9876</span>
    <span class="status delayed">+5 min</span>
  </div>
  <div class="route">
    <span class="route-city">Paris</span>
    <span class="route-arrow">→</span>
    <span class="route-city">Lyon</span>
  </div>
  <div class="warning">
    <span class="warning-text">⚠ Signal failure near Dijon</span>
  </div>
  <div class="info-row">
    <div class="info-item">
      <span class="info-label">Departure</span>
      <span class="info-value">16:20</span>
    </div>
    <div class="info-item">
      <span class="info-label">Platform</span>
      <span class="info-value platform">12</span>
    </div>
    <div class="info-item">
      <span class="info-label">New ETA</span>
      <span class="info-value" style="color: #FF9500;">16:25</span>
    </div>
  </div>
  <div class="progress-container">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill delayed" style="width: 15%;"></div>
    </div>
    <div class="progress-labels">
      <span>Paris Gare de Lyon</span>
      <span>Boarding</span>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <div class="nav-item active">
    <span class="nav-icon">◐</span>
    <span class="nav-label">My Trains</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">▤</span>
    <span class="nav-label">Stations</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">✈</span>
    <span class="nav-label">Passport</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">☰</span>
    <span class="nav-label">More</span>
  </div>
</div>
</body>
</html>
